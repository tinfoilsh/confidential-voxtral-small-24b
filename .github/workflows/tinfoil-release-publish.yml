# DO NOT RUN MANUALLY. This workflow is dispatched automatically by
# `tinfoil-release.yml` against the newly created release tag.

name: Tinfoil Release - Publish (auto-triggered)

run-name: Publish release ${{ github.ref_name }}

on:
  workflow_dispatch:

concurrency:
  group: tinfoil-container-release-${{ github.ref_name }}

jobs:
  measure-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub release
      packages: write       # attach the attestation to the image
      id-token: write       # keyless attestation signing
      attestations: write   # publish the attestation

    steps:
      - name: Measure image, attest, and publish the release
        uses: tinfoilsh/measure-image-action@52a22a50535b584d3831cbcda7b447bdb5a9f09e # v0.9.0
        with:
          config-file: ${{ github.workspace }}/tinfoil-config.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
